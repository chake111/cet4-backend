# ============================================================
# CET-4 Platform — Production Profile (EXAMPLE)
# Copy this file to application-prod.yml and fill in real values.
# NEVER commit application-prod.yml with real secrets to Git.
# ============================================================

spring:
  datasource:
    url: jdbc:mysql://PROD_DB_HOST:3306/cet4_platform?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      validation-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      connect-timeout: 5000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET}
  expiration: 2592000000  # 30天，单位毫秒

auth:
  rate-limit:
    login-ip-limit: ${AUTH_LOGIN_IP_LIMIT:30}
    login-username-limit: ${AUTH_LOGIN_USERNAME_LIMIT:20}
    login-failure-limit: ${AUTH_LOGIN_FAILURE_LIMIT:5}
    register-ip-limit: ${AUTH_REGISTER_IP_LIMIT:5}
    login-ip-window: ${AUTH_LOGIN_IP_WINDOW:1m}
    login-username-window: ${AUTH_LOGIN_USERNAME_WINDOW:15m}
    login-lock-window: ${AUTH_LOGIN_LOCK_WINDOW:15m}
    register-ip-window: ${AUTH_REGISTER_IP_WINDOW:1h}

exam:
  cache:
    session-ttl: ${EXAM_SESSION_TTL:130m}
    submit-lock-ttl: ${EXAM_SUBMIT_LOCK_TTL:3m}

management:
  endpoints:
    web:
      exposure:
        include: health

ai:
  deepseek:
    api-key: ${DEEPSEEK_API_KEY}
    base-url: https://api.deepseek.com
    model: deepseek-chat
    timeout: 30
